server {
    listen 80;
    server_name _;
    root  /usr/share/nginx/html;
    index index.html;

    # ── GZIP compression ─────────────────────────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_comp_level  6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                                          always;
    add_header X-Content-Type-Options   "nosniff"                                       always;
    add_header X-XSS-Protection         "1; mode=block"                                 always;
    add_header Referrer-Policy          "no-referrer"                                   always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()"      always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: https:; img-src 'self' data:; frame-ancestors 'none';"
        always;

    # ── Static assets — 1-year immutable cache (CRA outputs hashed filenames) ────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SPA — all routes served by index.html with no-cache ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
