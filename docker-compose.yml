version: '3.9'

# ─── SmartStadium Pulse OS — Docker Compose ───────────────────────────────────
#
# Development / single-host production deployment.
# For cloud deployments set REACT_APP_API_URL and ALLOWED_ORIGINS to your domain.
#
# Quick start:
#   cp backend/.env.example backend/.env   # then edit ADMIN_API_KEY
#   docker-compose up --build -d
#
# Logs:
#   docker-compose logs -f backend
#
# Stop:
#   docker-compose down

services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartstadium-backend
    env_file: ./backend/.env          # load PORT, ADMIN_API_KEY, etc. from file
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Allow the browser (running on host) to reach the backend
      - ALLOWED_ORIGINS=http://localhost:3000
      # Persist orders + alerts to a Docker volume
      - DB_PATH=/data/stadium.db
    volumes:
      - stadium-db:/data              # SQLite file survives container restarts
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 8s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the React bundle at build time.
        # For cloud: set to https://api.yourdomain.com
        REACT_APP_API_URL: "http://localhost:3001"
    container_name: smartstadium-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  stadium-db:
    name: smartstadium-db-data

networks:
  default:
    name: smartstadium-net
